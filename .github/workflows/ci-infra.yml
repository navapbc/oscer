name: CI Infra Checks

on:
  push:
    branches:
      - main
    paths:
      - bin/**
      - infra/**
      - .github/workflows/**
  pull_request:
    paths:
      - bin/**
      - infra/**
      - .github/workflows/**

jobs:
  check-compliance-with-tfsec:
    name: Check compliance with tfsec
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Set skip files
        run: echo "SKIP_FILES=$(git ls-files | grep -v -F -f <(git diff main --name-only infra))" >> $GITHUB_ENV
      - name: Run tfsec check
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          exit-code: '1'
          skip-files: $SKIP_FILES
