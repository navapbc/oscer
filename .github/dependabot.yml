version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # tfsec is deprecated (migrated to Trivy); the action can no longer download binaries.
      # Remove after migrating to Trivy. See https://github.com/navapbc/oscer/issues/456
      - dependency-name: "aquasecurity/tfsec-pr-commenter-action"
      # checkov v12.3096.0+ introduces 14 new findings against existing infra.
      # Remove after addressing findings. See https://github.com/navapbc/oscer/issues/457
      - dependency-name: "bridgecrewio/checkov-action"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      major:
        update-types: ["major"]

  - package-ecosystem: "bundler"
    directory: "/reporting-app"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      major:
        update-types: ["major"]

  - package-ecosystem: "npm"
    directory: "/reporting-app"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      major:
        update-types: ["major"]

  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      major:
        update-types: ["major"]

  - package-ecosystem: "docker"
    directory: "/reporting-app"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      major:
        update-types: ["major"]

  - package-ecosystem: "docker"
    directory: "/e2e"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      major:
        update-types: ["major"]

  - package-ecosystem: "terraform"
    directory: "/infra"
    schedule:
      interval: "monthly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      major:
        update-types: ["major"]
