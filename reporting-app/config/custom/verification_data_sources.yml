# Deployment-owned override surface for the verification Data Source registry.
#
# OSCER ships this file with no active overrides (the empty hash below); fill it
# in to add a deployment-specific data source, re-order exception/CE sources, or
# adjust which checks a source declares. Because OSCER rarely edits this file,
# your overrides stay conflict-free when you sync upstream changes.
#
# A "data source" is an external verification adapter (a Verification::DataSource
# subclass) plus a declaration of which checks it can make, grouped by category.
#
# Loader: app/services/verification_data_sources_loader.rb deep-merges this file
# over the OSCER-owned defaults in VerificationDataSourcesLoader::DEFAULTS. Keys
# present here win; keys absent here inherit from the defaults. See
# CUSTOMIZATION.md (Config) for the customization model.
#
# ## Shape
#
# The top-level hash is keyed by source id, with an attribute hash per entry:
#
#     source_id:
#       enabled: true                          # required; false = orchestrator skips it
#       adapter_class: "Fully::Qualified::AdapterClass"  # required; must be a
#                                                        # Verification::DataSource subclass
#       checks:                                # which checks this source can make, by category
#         exclusion: [is_veteran_with_disability]  # ids must be in Exclusion.valid_values
#         exception: []                        # ids must be in the ExternalException registry
#         ce: []                               # community-engagement ids (not yet registry-checked)
#       exception_order: null                  # call order among exception sources (Integer or null)
#       ce_order: null                         # call order among CE sources (Integer or null)
#
# The registry stores these order fields but does NOT pre-sort entries. Consumers
# (orchestrator) must sort by exception_order / ce_order themselves (nil last /
# after ordered sources) when building a call sequence.
#
# The loader validates at boot and raises a ConfigurationError naming the
# offending entry for: a missing/blank required key; an adapter_class that does
# not constantize (or is not a Verification::DataSource subclass); configured
# check ids absent from that adapter's .declared_outcomes; a declared
# check id absent from its category registry; a non-Integer order; or two sources
# sharing an exception_order / ce_order (call order must be unambiguous).
#
# NOTE: exclusion call/selection order is NOT configured here — Exclusion.priority_order
# (config/custom/exclusion_types.yml) owns it. Setting `exclusion_order:` on an
# entry is rejected at boot.
#
# ## Examples
#
# Add a deployment-specific exception data source and place it first among
# exception sources:
#
#     county_emergency_feed:
#       enabled: true
#       adapter_class: "Verification::Adapters::CountyEmergencyFeed"
#       checks:
#         exception: [declared_emergency_county]
#       exception_order: 10
#
# Disable a shipped source for this deployment (override just the toggle; other
# keys deep-merge from the defaults):
#
#     va_disability_rating:
#       enabled: false
#
# OSCER-owned defaults live in VerificationDataSourcesLoader::DEFAULTS
# (app/services/verification_data_sources_loader.rb).
#
# ## Empty-file note
#
# If you want to ship no overrides, leave the empty hash below as-is, or delete
# the file entirely — the loader treats a missing file as no overrides.

{}
