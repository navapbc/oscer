# Deployment-owned override surface for the verification Data Source registry.
#
# OSCER ships this file with no active overrides (the empty hash below); fill it
# in to add a deployment-specific data source, re-order verification sources, or
# disable a shipped source. Because OSCER rarely edits this file, your overrides
# stay conflict-free when you sync upstream changes.
#
# A "data source" is an external verification adapter (a Verification::DataSource
# subclass). Config owns enablement, wiring, and call order; the adapter class
# owns which outcome symbols it may emit via .declared_outcomes.
#
# Loader: app/services/verification_data_sources_loader.rb deep-merges this file
# over the OSCER-owned defaults in VerificationDataSourcesLoader::DEFAULTS. Keys
# present here win; keys absent here inherit from the defaults. See
# CUSTOMIZATION.md (Config) for the customization model.
#
# ## Shape
#
# The top-level hash is keyed by source id, with an attribute hash per entry:
#
#     source_id:
#       enabled: true                          # required; false = orchestrator skips it
#       adapter_class: "Fully::Qualified::AdapterClass"  # required; must be a
#                                                        # Verification::DataSource subclass
#                                                        # that implements .declared_outcomes
#       order: null                            # unified source call order (Integer or null)
#
# The registry stores this order field but does NOT pre-sort entries. Consumers
# (orchestrator) must sort by order themselves (nil last / after ordered sources)
# when building a call sequence. There is one source order because exception and
# community-engagement sources are evaluated in the same business process and
# may interleave.
#
# Set `order` only for sources that participate in that shared exception/CE call
# sequence. Leave it null for exclusion-only sources (for example the shipped VA
# disability-rating adapter). Exclusion outcome ranking is owned by
# Exclusion.priority_order (config/custom/exclusion_types.yml), not by this field.
#
# The loader validates at boot and raises a ConfigurationError naming the
# offending entry for: a missing/blank required key; an adapter_class that does
# not constantize (or is not a Verification::DataSource subclass); a missing /
# malformed .declared_outcomes; a declared outcome that is not a
# Determination::REASON_CODE_MAPPING key; a non-Integer order; or two sources
# sharing an order (call order must be unambiguous). Unknown keys are ignored.
#
# ## Examples
#
# Add a deployment-specific exception/CE data source and place it first among
# verification sources (outcomes come from the adapter's .declared_outcomes):
#
#     county_emergency_feed:
#       enabled: true
#       adapter_class: "Verification::Adapters::CountyEmergencyFeed"
#       order: 10
#
# Disable a shipped source for this deployment (override just the toggle; other
# keys deep-merge from the defaults):
#
#     va_disability_rating:
#       enabled: false
#
# OSCER-owned defaults live in VerificationDataSourcesLoader::DEFAULTS
# (app/services/verification_data_sources_loader.rb).
#
# ## Empty-file note
#
# If you want to ship no overrides, leave an empty hash (`{}`) here, or delete
# the file entirely — the loader treats a missing file as no overrides.

# Mock data source for use by ExclusionDeterminationService.
mock_drug_treatment:
  enabled: true
  adapter_class: "Verification::Adapters::MockDrugTreatment"
  order: null
