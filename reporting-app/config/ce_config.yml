# Community Engagement configuration — deployment-owned overrides.
#
# This file is preserved across `nava-platform app update` via Copier's
# `_skip_if_exists` directive, so customizations survive template upgrades.
# The template ships this file with no active overrides (the empty hash
# below); fill it in to tailor exemption-type composition to your program.
#
# Loader: app/services/ce_configuration.rb deep-merges this file over
# config/ce_config_base.yml. Keys present here win; keys absent here
# inherit from the base file. See fork-and-customize-spec.md Layer 1 for
# the design.
#
# ## Shape
#
# The top-level hash mirrors config/ce_config_base.yml: each section
# (e.g., `exemption_types`) is a hash keyed by entry id, with attribute
# hashes as values. The `enabled` key is required on every exemption-type
# entry — the loader raises a boot-time ConfigurationError otherwise.
#
# ## Examples
#
# Disable a default exemption type so it doesn't appear in screener or
# application flows:
#
#     exemption_types:
#       medical_condition:
#         enabled: false
#
# Add a deployment-specific exemption type (will need matching locale
# strings under config/locales/overrides/ for any user-facing labels):
#
#     exemption_types:
#       disaster_evacuation:
#         enabled: true
#
# Both at once:
#
#     exemption_types:
#       medical_condition:
#         enabled: false
#       disaster_evacuation:
#         enabled: true
#
# Defaults shipped by OSCER live in config/ce_config_base.yml.
#
# ## Empty-file note
#
# If you want to ship no overrides, leave `exemption_types: {}` below as-is
# (or delete the file entirely — the loader treats a missing file as
# no overrides). Commenting out every line will cause a boot-time error
# because YAML treats an all-comments file as nil rather than empty Hash.

exemption_types: {}
