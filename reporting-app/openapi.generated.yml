---
components:
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: 'HMAC-SHA256 signature. Format: HMAC sig={base64_encoded_signature}.
        The signature is computed from the request body using the shared secret key.'
  schemas:
    CertificationCreateRequestBody:
      type: object
      properties:
        member_id:
          type: string
          description: An identifier for the person receiving benefits
        case_number:
          type:
          - string
          - 'null'
          description: An identifier for the case associated with the certification
        certification_requirements:
          oneOf:
          - "$ref": "#/components/schemas/CertificationRequirements"
          - "$ref": "#/components/schemas/CertificationRequirementParameters"
          - "$ref": "#/components/schemas/CertificationRequirementTypeParameters"
        member_data:
          oneOf:
          - "$ref": "#/components/schemas/CertificationMemberData"
          - type: 'null'
      required:
      - member_id
      - certification_requirements
      examples:
        fully_specified_certification_requirements:
          value:
            member_id: '123'
            case_number: C-111
            certification_requirements:
              certification_date: '2025-09-26'
              number_of_months_to_certify: 1
              due_date: '2025-10-26'
              months_that_can_be_certified:
              - '2025-07-01'
              - '2025-08-01'
              - '2025-09-01'
            member_data:
              account_email: john@doe.com
              contact:
                email: john@doe.com
                phone: "+123456789"
              name:
                first: Johnathan
                middle: Alfred
                last: Doe
                suffix: Jr.
              activities:
              - type: hourly
                category: community_service
                hours: '20'
                period_start: '2025-09-01'
                period_end: '2025-09-30'
                employer: Community Center
                verification_status: verified
              date_of_birth: '1980-01-01'
              race_ethnicity: Hispanic
              pregnancy_status: false
        without_explicit_months_that_can_be_certified_and_due_date:
          value:
            member_id: '123'
            case_number: C-111
            certification_requirements:
              certification_date: '2025-09-26'
              lookback_period: 3
              number_of_months_to_certify: 1
              due_period_days: 30
            member_data:
              account_email: john@doe.com
              contact:
                email: john@doe.com
                phone: "+123456789"
              name:
                first: Johnathan
                middle: Alfred
                last: Doe
                suffix: Jr.
              date_of_birth: '1980-01-01'
              race_ethnicity: Hispanic
              pregnancy_status: false
        certification_type:
          value:
            member_id: '123'
            case_number: C-111
            certification_requirements:
              certification_date: '2025-09-26'
              certification_type: new_application
            member_data:
              account_email: john@doe.com
              contact:
                email: john@doe.com
                phone: "+123456789"
              name:
                first: Johnathan
                middle: Alfred
                last: Doe
                suffix: Jr.
              date_of_birth: '1980-01-01'
              race_ethnicity: Hispanic
              pregnancy_status: false
    CertificationRequirements:
      type: object
      description: Description of certification needs
      properties:
        certification_date:
          type: string
          format: date
          description: The date of the certification
        certification_type:
          type:
          - string
          - 'null'
          description: The type of certification
        months_that_can_be_certified:
          type: array
