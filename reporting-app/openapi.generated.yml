  license:
    name: Apache-2.0
    url: https://opensource.org/license/apache-2-0
  version: 1.0.0
servers:
- url: ''
  description: Current server
- url: http://medicaid.navateam.com
  description: Dev
paths:
  "/api/certifications":
    post:
      tags:
      - Certifications
      summary: Create a Certification record
      description: "#"
      operationId: POST__api_certifications
      requestBody:
        "$ref": "#/components/requestBodies/9a20e257a408f2d1144fe4cd8a2bcea4"
      responses:
        '201':
          "$ref": "#/components/responses/e0fec3ce491e03b0d2f165e51fe53045"
        '400':
          "$ref": "#/components/responses/9344d62901d19d44a3081e670ede89d5"
        '422':
          "$ref": "#/components/responses/a1ba9c6659724e47882231e17c5ba9c8"
  "/api/certifications/{id}":
    get:
      tags:
      - Certifications
      summary: Retrieve a Certification record
      description: "#"
      operationId: GET__api_certifications_{id}
      parameters:
      - "$ref": "#/components/parameters/49e46dd8af57e26752938ebb0d0ec979"
      responses:
        '200':
          "$ref": "#/components/responses/2855e3afe50e40571cd50a32a600a442"
        '404':
          "$ref": "#/components/responses/7264102827ae7c31183895656f9c8e54"
  "/api/health":
    get:
      tags:
      - Healthcheck
      summary: Check service health
      description: "#"
      operationId: GET__api_health
      responses:
        '200':
          "$ref": "#/components/responses/c36cf290ef53fdcc17b51c38d5dd6949"
        '503':
          "$ref": "#/components/responses/b1a8f0f60c27014214650117f9932997"
