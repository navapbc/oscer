---
components:
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: 'HMAC-SHA256 signature. Format: HMAC sig={base64_encoded_signature}.
        The signature is computed from the request body using the shared secret key.'
  schemas:
    CertificationCreateRequestBody:
      type: object
      properties:
        member_id:
          type: string
          description: An identifier for the person receiving benefits
        case_number:
          type:
          - string
          - 'null'
          description: An identifier for the case associated with the certification
        certification_requirements:
          oneOf:
          - "$ref": "#/components/schemas/CertificationRequirements"
          - "$ref": "#/components/schemas/CertificationRequirementParameters"
          - "$ref": "#/components/schemas/CertificationRequirementTypeParameters"
        member_data:
          oneOf:
          - "$ref": "#/components/schemas/CertificationMemberData"
          - type: 'null'
      required:
      - member_id
      - certification_requirements
      examples:
        fully_specified_certification_requirements:
          value:
            member_id: '123'
            case_number: C-111
            certification_requirements:
              certification_date: '2025-09-26'
              number_of_months_to_certify: 1
              due_date: '2025-10-26'
              months_that_can_be_certified:
              - '2025-07-01'
              - '2025-08-01'
              - '2025-09-01'
            member_data:
              account_email: john@doe.com
              contact:
                email: john@doe.com
                phone: "+123456789"
              name:
                first: Johnathan
                middle: Alfred
                last: Doe
                suffix: Jr.
              activities:
              - type: hourly
                category: community_service
                hours: '20'
                period_start: '2025-09-01'
                period_end: '2025-09-30'
                employer: Community Center
                verification_status: verified
              date_of_birth: '1980-01-01'
              race_ethnicity: Hispanic
              pregnancy_status: false
        without_explicit_months_that_can_be_certified_and_due_date:
          value:
            member_id: '123'
            case_number: C-111
            certification_requirements:
              certification_date: '2025-09-26'
              lookback_period: 3
              number_of_months_to_certify: 1
              due_period_days: 30
            member_data:
              account_email: john@doe.com
              contact:
                email: john@doe.com
                phone: "+123456789"
              name:
                first: Johnathan
                middle: Alfred
                last: Doe
                suffix: Jr.
              date_of_birth: '1980-01-01'
              race_ethnicity: Hispanic
              pregnancy_status: false
        certification_type:
          value:
            member_id: '123'
            case_number: C-111
            certification_requirements:
              certification_date: '2025-09-26'
              certification_type: new_application
            member_data:
              account_email: john@doe.com
              contact:
                email: john@doe.com
                phone: "+123456789"
              name:
                first: Johnathan
                middle: Alfred
                last: Doe
                suffix: Jr.
              date_of_birth: '1980-01-01'
              race_ethnicity: Hispanic
              pregnancy_status: false
    CertificationRequirements:
      type: object
      description: Description of certification needs
      properties:
        certification_date:
          type: string
          format: date
          description: The date of the certification
        certification_type:
          type:
          - string
          - 'null'
          description: The type of certification
        months_that_can_be_certified:
          type: array
          items:
            type: string
            format: date
          description: The list of months the Member can choose from
        number_of_months_to_certify:
          type: integer
          description: The number of months the Member needs to certify
        due_date:
          type: string
          format: date
          description: Date by which the Member must have submitted their evidence
      required:
      - certification_date
      - months_that_can_be_certified
      - number_of_months_to_certify
      - due_date
    CertificationRequirementParameters:
      type: object
      properties:
        certification_date:
          type: string
          format: date
          description: The date of the certification
        lookback_period:
          type: integer
          description: The number of months before `certification_date` the Member
            can choose from
        number_of_months_to_certify:
          type: integer
          description: The number of months the Member needs to certify
        due_period_days:
          type: integer
      required:
      - certification_date
      - lookback_period
      - number_of_months_to_certify
      - due_period_days
    CertificationRequirementTypeParameters:
      type: object
      properties:
        certification_date:
          type: string
          format: date
          description: The date of the certification
        certification_type:
          type: string
          description: The type of certification
      required:
      - certification_date
      - certification_type
    CertificationMemberData:
      type: object
      description: Description of member
      properties:
        account_email:
          type:
          - string
          - 'null'
          format: email
          description: The email of the Medicare account for the member
        contact:
          type:
          - object
          - 'null'
          description: Contact information of the member
          properties:
            email:
              type:
              - string
              - 'null'
              format: email
            phone:
              type:
              - string
              - 'null'
              pattern: "^\\+\\d{1,3}\\s\\d{1,14}(\\s\\d{1,13})?$"
        name:
          type:
          - object
          - 'null'
          description: The name of the member
          properties:
            first:
              type:
              - string
              - 'null'
            middle:
              type:
              - string
              - 'null'
            last:
              type:
              - string
              - 'null'
            suffix:
              type:
              - string
              - 'null'
        payroll_accounts:
          type:
          - array
          - 'null'
          items:
            "$ref": "#/components/schemas/CertificationMemberDataPayrollAccount"
        activities:
          type:
          - array
          - 'null'
          items:
            "$ref": "#/components/schemas/CertificationMemberDataActivity"
          description: Community engagement activities performed by the member
        date_of_birth:
          type:
          - string
          - 'null'
          format: date
          description: The date of birth of the member
        race_ethnicity:
          type:
          - string
          - 'null'
          description: The race or ethnicity of the member
        pregnancy_status:
          type:
          - boolean
          - 'null'
          description: The pregnancy status of the member
    CertificationMemberDataPayrollAccount:
      type: object
      description: Description of a payroll
      properties:
        company_name:
          type: string
        paychecks:
          type:
          - array
          - 'null'
          items:
            "$ref": "#/components/schemas/CertificationMemberDataPayrollAccountPaycheck"
    CertificationMemberDataPayrollAccountPaycheck:
      type: object
      description: Description of a paycheck
      properties:
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        gross:
          type:
          - string
          - 'null'
          format: decimal
        net:
          type:
          - string
          - 'null'
          format: decimal
        hours_worked:
          type:
          - string
          - 'null'
          format: decimal
      required:
      - period_start
      - period_end
    CertificationMemberDataActivity:
      type: object
      description: Description of an activity
      properties:
        type:
          type: string
          enum:
          - hourly
          - income
          description: The type of activity (currently only 'hourly' is used)
        category:
          type: string
          enum:
          - employment
          - community_service
          - education
          description: The category of activity
        hours:
          type: string
          format: decimal
          description: Number of hours for the activity
        period_start:
          type: string
          format: date
          description: Start date of the activity period
        period_end:
          type: string
          format: date
          description: End date of the activity period
        employer:
          type:
          - string
          - 'null'
          description: Employer or organization associated with the activity
        verification_status:
          type:
          - string
          - 'null'
          enum:
          - verified
          - self_attested
          - pending
          -
          description: Verification status of the activity
      required:
      - type
      - category
      - hours
      - period_start
      - period_end
    CertificationResponseBody:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identifier for the certification record
        member_id:
          type: string
          description: An identifier for the person receiving benefits
        case_number:
          type:
          - string
          - 'null'
          description: An identifier for the case associated with the certification
        certification_requirements:
          oneOf:
          - allOf:
            - "$ref": "#/components/schemas/CertificationRequirements"
            - type: object
              properties:
                params:
                  type:
                  - object
                  - 'null'
                  description: Additional parameters for the certification requirements
          - type: 'null'
        member_data:
          anyOf:
          - "$ref": "#/components/schemas/CertificationMemberData"
          - type: 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - member_id
      - created_at
      - updated_at
      example:
        id: 63680317-0e33-40a7-8e1a-249a2f5855d9
        member_id: '123'
        case_number: C-111
        certification_requirements:
          certification_date: '2025-09-26'
          months_that_can_be_certified:
          - '2025-07-01'
          - '2025-08-01'
          - '2025-09-01'
          number_of_months_to_certify: 1
          due_date: '2025-10-26'
          params:
            lookback_period: 3
            number_of_months_to_certify: 1
            due_period_days: 30
        member_data:
          account_email: john@doe.com
          contact:
            email: john@doe.com
            phone: "+123456789"
          name:
            first: Johnathan
            middle: Alfred
            last: Doe
            suffix: Jr.
          activities:
          - type: hourly
            category: community_service
            hours: '20'
            period_start: '2025-09-01'
            period_end: '2025-09-30'
            employer: Community Center
            verification_status: verified
          date_of_birth: '1980-01-01'
          race_ethnicity: Hispanic
          pregnancy_status: false
        created_at: '1970-01-01T00:00:00.000Z'
        updated_at: '1970-01-01T00:00:00.000Z'
    ErrorResponseBody:
      type: object
      properties:
        errors:
          type: array
          items:
            oneOf:
            - type: string
            - type: object
      example:
        errors:
        - Not found
    ece4f2c15f241af4536e1132d15a279a:
      type: object
      properties:
        status:
          type: string
      required:
      - status
  responses:
    4b6831c29339b7554496297ad925a8f5:
      description: Created Certification.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/CertificationResponseBody"
    12dc15e1bad7a054ce75fe5a74d1bbda:
