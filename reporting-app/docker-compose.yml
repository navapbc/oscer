services:
  reporting-app-db16:
    image: postgres:16-alpine
    command: postgres -c "log_lock_waits=on" -N 1000 -c "fsync=off"
    environment:
      POSTGRES_PASSWORD: secret123
      POSTGRES_USER: app
    healthcheck:
      test: "pg_isready --username=app"
      timeout: 10s
      retries: 20
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - reporting-app-db16_data:/var/lib/postgresql/data

  # Rails app
  # Configured for "development" RAILS_ENV
  reporting-app:
    build:
      context: .
      target: dev
    depends_on:
      reporting-app-db16:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_HOST=reporting-app-db16
      - RAILS_BINDING=0.0.0.0
      - RAILS_ENV=development
      # When running the doc-ai service via its own compose stack, use the container
      # name so Rails can reach it over the Docker network instead of localhost:
      - DOC_AI_API_HOST=http://strata-service-document-ai-service:8080
    networks:
      - default
      - strata-service-document-ai_default
    ports:
      - 3000:3000
    volumes:
      - .:/rails
      # Use named volumes for directories that the container should use the guest
      # machine's dir instead of the host machine's dir, which may be divergent.
      # This is especially true for any dependency or temp directories.
      - reporting-app_nodemodules:/rails/node_modules
      - reporting-app_tmp:/rails/tmp
      - reporting-app_storage:/rails/storage

volumes:
  reporting-app-db16_data:
  reporting-app_nodemodules:
  reporting-app_tmp:
  reporting-app_storage:

networks:
  # Attach to the doc-ai service network so the reporting-app container can
  # resolve the strata-service-document-ai-service hostname directly.
  strata-service-document-ai_default:
    external: true
